<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kalkulator Slovin</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Slovin">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185fa5">

<style>
  :root{
    --bg:#f5f5f4; --card:#ffffff; --border:#e5e3de; --text:#1c1c1a;
    --muted:#6b6a65; --accent:#185fa5; --accentbg:#e6f1fb;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#2c2c2a; --card:#3a3a37; --border:#4a4a46; --text:#f1efe8;
      --muted:#b4b2a9; --accent:#85b7eb; --accentbg:#0c447c;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    background:var(--card); border:0.5px solid var(--border); border-radius:16px;
    padding:1.5rem; width:100%; max-width:360px;
  }
  h1{font-size:18px; font-weight:500; margin:0 0 1.25rem; text-align:center;}
  label{font-size:13px; color:var(--muted); display:block; margin-bottom:4px;}
  input, select{
    width:100%; height:44px; border-radius:10px; border:0.5px solid var(--border);
    background:var(--bg); color:var(--text); font-size:16px; padding:0 12px;
    margin-bottom:1.25rem; -webkit-appearance:none; appearance:none;
  }
  .result{
    background:var(--accentbg); border-radius:12px; padding:1.25rem; text-align:center;
  }
  .result p{margin:0;}
  .result .label{font-size:13px; color:var(--muted);}
  .result .value{font-size:36px; font-weight:600; color:var(--accent); margin-top:4px;}
  .formula{font-size:12px; color:var(--muted); text-align:center; margin-top:1.25rem;}
</style>
</head>
<body>
  <div class="card">
    <h1>Kalkulator Rumus Slovin</h1>

    <label for="pop">Jumlah populasi (N)</label>
    <input type="number" id="pop" value="500" min="1" inputmode="numeric">

    <label for="err">Margin of error (e)</label>
    <select id="err">
      <option value="0.01">1%</option>
      <option value="0.05" selected>5%</option>
      <option value="0.1">10%</option>
    </select>

    <div class="result">
      <p class="label">Sampel minimal (n)</p>
      <p class="value" id="result">222</p>
    </div>

    <p class="formula">n = N / (1 + N·e²)</p>
  </div>

<script>
function calc(){
  var N = parseFloat(document.getElementById('pop').value) || 0;
  var e = parseFloat(document.getElementById('err').value);
  var n = N > 0 ? N / (1 + N * e * e) : 0;
  document.getElementById('result').textContent = Math.ceil(n);
}
document.getElementById('pop').addEventListener('input', calc);
document.getElementById('err').addEventListener('change', calc);
calc();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
